name: Network Tests

on:
  push:
    branches: ["**"]

jobs:
  network-testing:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip3 install --break-system-packages -r requirements.txt

      - name: Deploy network lab
        run: |
          sudo containerlab deploy -t containerlab/topology.yml --reconfigure
          echo "Waiting for devices to boot...."
          sleep 30

      - name: Run reachability tests
        run: |
          mkdir -p results
          python3 -m pytest tests/test_reachability.py -v --tb=short --junitxml=results/reachability.xml

      - name: Run config compliance tests
        run: python3 -m pytest tests/test_config_compliance.py -v --tb=short --junitxml=results/compliance.xml

      - name: Run security policy tests
        run: python3 -m pytest tests/test_security_policy.py -v --tb=short --junitxml=results/security.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results/

      - name: Destroy network lab
        if: always()
        run: sudo containerlab destroy -t containerlab/topology.yml --cleanup
