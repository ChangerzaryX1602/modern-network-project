---
name: srlinux-network-lab
#test
mgmt:
  network: clab-mgmt
  ipv4-subnet: 172.30.30.0/24

topology:
  defaults:
    kind: nokia_srlinux
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:latest

  nodes:
    srl1:
      mgmt-ipv4: 172.30.30.2
      startup-config: configs/srl1.cli

    srl2:
      mgmt-ipv4: 172.30.30.3
      startup-config: configs/srl2.cli

    srl3:
      mgmt-ipv4: 172.30.30.4
      startup-config: configs/srl3.cli

  links:
    - endpoints: ["srl1:e1-1", "srl2:e1-1"]
    - endpoints: ["srl1:e1-2", "srl3:e1-1"]
    - endpoints: ["srl2:e1-2", "srl3:e1-2"]
